<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Aletheia: truth as unconcealment -->
  
  <!-- Outer ring - the veil, broken open -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#e2e8f0" stroke-width="3"
    stroke-dasharray="143.26 20" stroke-dashoffset="-10" opacity="0.35"/>
  
  <!-- Middle arc - emergence of knowing -->
  <circle cx="32" cy="32" r="18" fill="none" stroke="#94a3b8" stroke-width="2.5"
    stroke-dasharray="90 23.27" stroke-dashoffset="40" opacity="0.55"/>

  <!-- Inner luminous point - aletheia, disclosed truth -->
  <circle cx="32" cy="32" r="5" fill="url(#truth)"/>
  
  <!-- Subtle radiance -->
  <circle cx="32" cy="32" r="10" fill="url(#glow)" opacity="0.5"/>

  <defs>
    <radialGradient id="truth" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#64748b"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e2e8f0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#e2e8f0" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
